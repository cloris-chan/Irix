name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: D3D12 smoke tests
        run: dotnet test --no-build -c Release --filter "Category=D3D12" --verbosity normal

      - name: Publish (Poc only)
        run: dotnet publish src/Irix.Poc/Irix.Poc.csproj -c Release -r win-x64 --self-contained

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify .NET 10 and Windows SDK 26100
        shell: pwsh
        run: |
          $dotnetSdks = dotnet --list-sdks
          if (-not ($dotnetSdks | Where-Object { $_ -match '^10\.' })) {
            throw "Required .NET 10 SDK was not found. Installed SDKs: $($dotnetSdks -join ', ')"
          }

          $windowsSdkPath = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\Lib\10.0.26100.0'
          if (-not (Test-Path $windowsSdkPath)) {
            $windowsSdkRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\Lib'
            $installedWindowsSdks = if (Test-Path $windowsSdkRoot) { Get-ChildItem $windowsSdkRoot -Directory | Select-Object -ExpandProperty Name } else { @() }
            throw "Required Windows SDK 10.0.26100.0 was not found. Installed SDKs: $($installedWindowsSdks -join ', ')"
          }

          dotnet --info

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: D3D12 smoke tests
        run: dotnet test --no-build -c Release --filter "Category=D3D12" --verbosity normal

      - name: Publish (Poc only)
        run: dotnet publish src/Irix.Poc/Irix.Poc.csproj -c Release -r win-x64 --self-contained
